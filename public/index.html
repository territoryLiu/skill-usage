<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>技能看板</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="home">
    <main class="dashboard-shell">
      <header class="topbar panel-shell">
        <div class="brand-lockup">
          <div class="brand-mark">SP</div>
          <div>
            <h1 data-i18n="brandTitle">技能看板</h1>
          </div>
        </div>
        <nav class="page-nav" aria-label="主导航">
          <a class="is-active" href="/" data-i18n="nav.home">首页</a>
          <a href="/monitor.html" data-i18n="nav.monitor">监控</a>
          <a href="/trends.html" data-i18n="nav.trends">趋势</a>
          <a href="/history.html" data-i18n="nav.history">历史</a>
        </nav>
        <div class="header-side">
          <div class="language-toggle" id="language-toggle"></div>
          <div class="connection-pill" id="connection-pill">
            <span class="pulse-dot"></span>
            <span id="connection-text">实时连接正常</span>
          </div>
        </div>
      </header>

      <section class="hero-panel panel-shell podium-panel podium-only">
        <div id="podium-stage" class="podium-stage podium-stage-home"></div>
      </section>

      <section class="home-grid">
        <div class="rankings-column">
          <div id="leaderboard-list" class="leaderboard-list"></div>
        </div>

        <aside class="sidebar-column">
          <div class="page-tools home-tools">
            <div class="timeframe-switch" id="timeframe-switch"></div>
          </div>
          <div id="summary-cards" class="summary-stack"></div>
        </aside>
      </section>
    </main>

    <script src="/scripts/dashboard-models.js"></script>
    <script src="/scripts/dashboard-core.js"></script>
    <script src="/scripts/home-page.js"></script>
  </body>
</html>
